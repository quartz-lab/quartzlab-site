name: Update plugin download counts

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-plugin-downloads
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read GitHub Release asset counters
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          catalog="public/data/plugins.json"
          output="public/data/downloads.json"
          counts='{}'

          while IFS=$'\t' read -r slug repository_url asset_name; do
            if [[ -z "$repository_url" ]]; then
              counts=$(jq --arg slug "$slug" '. + {($slug): 0}' <<<"$counts")
              continue
            fi

            repo="${repository_url#https://github.com/}"
            repo="${repo%/}"
            repo="${repo%.git}"
            releases=$(curl --fail --silent --show-error --retry 3 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${repo}/releases?per_page=100")
            if [[ -n "$asset_name" ]]; then
              count=$(jq --arg asset "$asset_name" '[.[].assets[] | select(.name == $asset) | .download_count] | add // 0' <<<"$releases")
            else
              count=$(jq '[.[].assets[] | select(.name | test("\\.zip$"; "i")) | .download_count] | add // 0' <<<"$releases")
            fi
            counts=$(jq --arg slug "$slug" --argjson count "$count" '. + {($slug): $count}' <<<"$counts")
          done < <(jq -r '.[] | [.slug, (.repositoryUrl // ""), (.downloadAsset // "")] | @tsv' "$catalog")

          jq -n --arg generatedAt "$(date -u +%FT%TZ)" --argjson plugins "$counts" \
            '{generatedAt: $generatedAt, plugins: $plugins}' > "$output"

      - name: Commit updated counters
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- public/data/downloads.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/downloads.json
          git commit -m "chore: update plugin download counts"
          git push
