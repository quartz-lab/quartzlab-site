name: Sync plugin release data

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
  push:
    paths:
      - "catalog/plugins.config.json"
      - "site.config.json"
      - "functions/**"
      - "scripts/**"
      - ".github/workflows/sync-plugin-releases.yml"

permissions:
  contents: write

concurrency:
  group: sync-plugin-release-data
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GITHUB_PUBLIC_READ_TOKEN: ${{ secrets.GITHUB_PUBLIC_READ_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync latest published releases
        run: node scripts/sync-plugins.mjs

      - name: Validate generated site
        run: node scripts/validate-site.mjs

      - name: Run tests
        run: node --test

      - name: Commit synced release data
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A -- public

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "chore: sync plugin release data"
          git push
