<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="QuartzLab plugin documentation">
  <title>QuartzLab Documentation</title>
  <link rel="icon" href="/assets/quartzlab-mark.svg" type="image/svg+xml">
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="shell header-inner">
      <a class="brand" href="/en/">
        <img src="/assets/quartzlab-mark.svg" alt="">
        <span>Quartz<span>Lab</span></span>
      </a>
      <nav class="main-nav" aria-label="Main navigation">
        <a href="/en/#plugins">Plugins</a>
        <a href="/en/about/">About</a>
      </nav>
      <div class="header-actions">
        <div class="language-switch" aria-label="Language">
          <a data-language="ru" href="/ru/">RU</a>
          <a data-language="en" href="/en/">EN</a>
        </div>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch theme"></button>
      </div>
    </div>
  </header>
  <main id="docsPage" class="shell docs-page">
    <div class="page-loading">Opening documentation...</div>
  </main>
  <footer class="site-footer compact-footer">
    <div class="shell footer-bottom footer-bottom-links">
      <span>© 2026 QuartzLab</span>
      <a href="/en/">QuartzLab</a>
      <a href="/en/about/">About</a>
    </div>
  </footer>
  <script src="/site.js" defer></script>
  <script src="/docs.js" defer></script>
</body>
</html>
